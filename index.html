<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GrooveBox – Music Player</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<div class="app">

  <div class="player">
    <div class="player-header">
      <span class="app-name">GrooveBox</span>
      <label class="autoplay-toggle">
        <div class="toggle-track on" id="autoplay-track">
          <div class="toggle-thumb"></div>
        </div>
        Autoplay
      </label>
    </div>

    <div class="artwork-wrap">
      <canvas id="art-canvas" width="300" height="300"></canvas>
      <div class="vinyl-ring">
        <svg id="vinyl-svg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
          <circle cx="50" cy="50" r="48" fill="none" stroke="rgba(168,85,247,.25)" stroke-width="1"/>
          <circle cx="50" cy="50" r="36" fill="none" stroke="rgba(168,85,247,.15)" stroke-width="1"/>
          <circle cx="50" cy="50" r="24" fill="none" stroke="rgba(168,85,247,.2)" stroke-width="1"/>
          <circle cx="50" cy="50" r="6" fill="rgba(168,85,247,.6)"/>
        </svg>
      </div>
      <span class="artwork-badge" id="track-index-badge">1 / 6</span>
    </div>

    <div class="song-info">
      <div class="song-title" id="song-title">Midnight Drift</div>
      <div class="song-artist">by <span id="song-artist">Luna Echo</span></div>
    </div>

    <div class="progress-area">
      <div class="time-row">
        <span id="current-time">0:00</span>
        <span id="total-duration">0:00</span>
      </div>
      <input type="range" id="progress-bar" min="0" max="100" value="0" style="--pct:0%"/>
    </div>

    <div class="controls">
      <button class="ctrl-btn" id="shuffle-btn" title="Shuffle">
        <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/>
          <polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/>
        </svg>
      </button>
      <button class="ctrl-btn" id="prev-btn" title="Previous">
        <svg width="26" height="26" fill="currentColor" viewBox="0 0 24 24">
          <path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/>
        </svg>
      </button>
      <button class="play-btn" id="play-btn" title="Play / Pause">
        <svg id="play-icon" width="28" height="28" fill="white" viewBox="0 0 24 24">
          <path d="M8 5v14l11-7z"/>
        </svg>
      </button>
      <button class="ctrl-btn" id="next-btn" title="Next">
        <svg width="26" height="26" fill="currentColor" viewBox="0 0 24 24">
          <path d="M6 18l8.5-6L6 6v12zm2-8.14L11.03 12 8 14.14V9.86zM16 6h2v12h-2z"/>
        </svg>
      </button>
      <button class="ctrl-btn" id="repeat-btn" title="Repeat">
        <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/>
          <polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/>
        </svg>
      </button>
    </div>

    <div class="volume-row">
      <svg class="vol-icon" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
        <path id="vol-wave1" d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
        <path id="vol-wave2" d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
      </svg>
      <input type="range" id="volume-bar" min="0" max="100" value="80"/>
    </div>
  </div>

  <div class="playlist-card">
    <div class="playlist-header">
      <span class="playlist-title">Playlist</span>
      <span class="track-count" id="track-count">6 tracks</span>
    </div>
    <input class="playlist-search" type="text" id="search-input" placeholder="Search tracks…"/>
    <div class="playlist-list" id="playlist-list"></div>
  </div>

</div>

<audio id="audio-player"></audio>
<script src="script.js"></script>
</body>
</html>
